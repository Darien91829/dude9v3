<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANI.PM - Browse Anime</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-pitch-black text-gray-200 min-h-screen">

  <nav class="sticky top-0 z-40 bg-pitch-black/95 backdrop-blur border-b border-dark px-4 py-3 flex items-center justify-between">
    <div class="flex items-center space-x-3">
      <div class="profile-avatar-mini bg-emerald-500 rounded-full w-8 h-8 flex items-center justify-center text-black font-bold text-xs">
        PM
      </div>
      <span class="text-white text-lg font-bold tracking-wider cursor-pointer" onclick="resetToHome()">ANI.PM</span>
    </div>
    
    <div class="flex-1 max-w-xs mx-4 relative">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
        <i class="fa-solid fa-magnifying-glass text-xs"></i>
      </span>
      <input type="text" id="nav-search" placeholder="Search anime..." class="w-full bg-dark-input border border-dark rounded-full pl-8 pr-4 py-1 text-xs focus:outline-none focus:border-emerald-500" onkeydown="if(event.key === 'Enter') syncAndSearch(this.value)">
    </div>

    <div class="text-gray-400 hover:text-white cursor-pointer">
      <i class="fa-solid fa-user text-sm"></i>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-6 space-y-6">
    
    <div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Browse Anime</h1>
    </div>

    <div class="relative space-y-3">
      
      <div class="flex items-center gap-2">
        <div class="flex-1 bg-dark-card rounded-xl border border-dark flex items-center px-3 py-2.5 focus-within:border-emerald-500 transition-all shadow-xl">
          <i class="fa-solid fa-magnifying-glass text-gray-500 mr-2.5 text-sm"></i>
          <input type="text" id="main-search-bar" placeholder="Search anime, genres, or a..." class="w-full bg-transparent text-sm focus:outline-none text-white placeholder-gray-500" oninput="liveSearchUpdate(this.value)">
        </div>
        
        <button onclick="toggleFilterDropdown()" id="filter-toggle-btn" class="bg-dark-card border border-dark hover:border-emerald-500 text-gray-400 hover:text-white p-3 rounded-xl transition-all flex items-center justify-center shadow-xl">
          <i class="fa-solid fa-sliders text-sm"></i>
        </button>
      </div>

      <div id="filter-dropdown-panel" class="hidden absolute left-0 right-0 top-full mt-2 bg-[#121214] border border-dark rounded-2xl p-4 shadow-2xl z-30 space-y-4">
        
        <div class="flex items-center justify-between border-b border-dark/60 pb-2">
          <span class="text-xs font-bold uppercase tracking-wider text-gray-400">Refine results</span>
          <button onclick="resetAllFilters()" class="text-[11px] text-gray-400 hover:text-emerald-400 flex items-center gap-1 transition-colors">
            <i class="fa-solid fa-rotate-left text-[10px]"></i> Reset
          </button>
        </div>

        <div class="space-y-1.5">
          <span class="text-[10px] uppercase font-bold text-gray-500 tracking-wider block">Genres and themes</span>
          <div id="genres-tag-cloud" class="flex flex-wrap gap-1.5">
            <button onclick="handleGenreTagClick(this, 'Action')" class="genre-pill">Action</button>
            <button onclick="handleGenreTagClick(this, 'Adventure')" class="genre-pill">Adventure</button>
            <button onclick="handleGenreTagClick(this, 'Comedy')" class="genre-pill">Comedy</button>
            <button onclick="handleGenreTagClick(this, 'Drama')" class="genre-pill">Drama</button>
            <button onclick="handleGenreTagClick(this, 'Fantasy')" class="genre-pill">Fantasy</button>
            <button onclick="handleGenreTagClick(this, 'Mystery')" class="genre-pill">Mystery</button>
            <button onclick="handleGenreTagClick(this, 'Romance')" class="genre-pill">Romance</button>
            <button onclick="handleGenreTagClick(this, 'Sci-Fi')" class="genre-pill">Sci-Fi</button>
            <button onclick="handleGenreTagClick(this, 'Slice of Life')" class="genre-pill">Slice of Life</button>
            <button onclick="handleGenreTagClick(this, 'Supernatural')" class="genre-pill">Supernatural</button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-wider block">Format</label>
            <select id="drop-format" onchange="runCatalogQuery()" class="filter-select">
              <option value="">All Anime</option>
              <option value="TV">Series</option>
              <option value="MOVIE">Films</option>
              <option value="OVA">OVA</option>
            </select>
          </div>

          <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-wider block">Sort</label>
            <select id="drop-sort" onchange="runCatalogQuery()" class="filter-select">
              <option value="POPULARITY_DESC">Popular</option>
              <option value="TRENDING_DESC">Trending</option>
              <option value="SCORE_DESC">Top Rated</option>
            </select>
          </div>

          <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-wider block">From Year</label>
            <input type="number" id="num-year-from" placeholder="2000" min="1990" max="2026" oninput="runCatalogQuery()" class="filter-select">
          </div>

          <div class="space-y-1">
            <label class="text-[10px] font-bold uppercase text-gray-500 tracking-wider block">To Year</label>
            <input type="number" id="num-year-to" placeholder="2026" min="1990" max="2026" oninput="runCatalogQuery()" class="filter-select">
          </div>
        </div>

        <div class="pt-2">
          <button onclick="toggleFilterDropdown()" class="w-full bg-white hover:bg-gray-200 text-black font-bold py-2 rounded-xl text-xs uppercase tracking-wider transition-colors shadow-lg">
            Show Results
          </button>
        </div>
      </div>
    </div>

    <div class="flex items-center space-x-2 overflow-x-auto pb-1 scroll-row text-xs">
      <button id="quick-pop" onclick="setQuickSort('POPULARITY_DESC', this)" class="quick-filter-btn active">Popular</button>
      <button id="quick-trend" onclick="setQuickSort('TRENDING_DESC', this)" class="quick-filter-btn">Trending</button>
      <button id="quick-score" onclick="setQuickSort('SCORE_DESC', this)" class="quick-filter-btn">Top rated</button>
    </div>

    <section class="space-y-3">
      <h2 id="catalog-section-title" class="text-sm font-bold uppercase text-gray-400 tracking-wider">Popular Anime</h2>
      
      <div id="anime-display-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
        <p class="text-xs text-gray-500 col-span-full">Loading index tracking records...</p>
      </div>
    </section>

  </main>

  <script>
    let activeGenres = [];
    let activeSortOrder = "POPULARITY_DESC";
    let inputDebounceTimer = null;

    function toggleFilterDropdown() {
      const panel = document.getElementById('filter-dropdown-panel');
      const toggleBtn = document.getElementById('filter-toggle-btn');
      
      if (panel.classList.contains('hidden')) {
        panel.classList.remove('hidden');
        toggleBtn.classList.add('active-green');
      } else {
        panel.classList.add('hidden');
        toggleBtn.classList.remove('active-green');
      }
    }

    function handleGenreTagClick(element, name) {
      if (element.classList.contains('active')) {
        element.classList.remove('active');
        activeGenres = activeGenres.filter(g => g !== name);
      } else {
        element.classList.add('active');
        activeGenres.push(name);
      }
      runCatalogQuery();
    }

    function setQuickSort(sortValue, element) {
      document.querySelectorAll('.quick-filter-btn').forEach(b => b.classList.remove('active'));
      element.classList.add('active');
      document.getElementById('drop-sort').value = sortValue;
      activeSortOrder = sortValue;
      runCatalogQuery();
    }

    function liveSearchUpdate(val) {
      clearTimeout(inputDebounceTimer);
      // Wait for user to stop typing for 250ms before querying API
      inputDebounceTimer = setTimeout(() => {
        document.getElementById('nav-search').value = val;
        runCatalogQuery();
      }, 250);
    }

    function syncAndSearch(val) {
      document.getElementById('main-search-bar').value = val;
      runCatalogQuery();
    }

    function resetAllFilters() {
      activeGenres = [];
      document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
      document.getElementById('drop-format').value = "";
      document.getElementById('drop-sort').value = "POPULARITY_DESC";
      document.getElementById('num-year-from').value = "";
      document.getElementById('num-year-to').value = "";
      document.getElementById('main-search-bar').value = "";
      document.getElementById('nav-search').value = "";
      runCatalogQuery();
    }

    function resetToHome() {
      resetAllFilters();
    }

    // Handles request schema parameter matching arrays
    async function runCatalogQuery() {
      const grid = document.getElementById('anime-display-grid');
      const queryStr = document.getElementById('main-search-bar').value.trim();
      const formatVal = document.getElementById('drop-format').value || null;
      const sortSelect = document.getElementById('drop-sort').value;
      const yearFrom = parseInt(document.getElementById('num-year-from').value) || null;
      const yearTo = parseInt(document.getElementById('num-year-to').value) || null;

      document.getElementById('catalog-section-title').innerText = queryStr ? `Results for "${queryStr}"` : "Filtered Results";

      // Build out variables parameters safely
      let variables = { sort: [sortSelect] };
      if (queryStr) {
        variables.q = queryStr;
        if (sortSelect === 'POPULARITY_DESC' || sortSelect === 'TRENDING_DESC') {
          variables.sort = ['SEARCH_MATCH'];
        }
      }
      if (activeGenres.length > 0) variables.genres = activeGenres;
      if (formatVal) variables.format = formatVal;
      if (yearFrom) variables.startDate = parseInt(yearFrom + "0000");
      if (yearTo) variables.endDate = parseInt(yearTo + "1231");

      const graphQLSchemaQuery = `
        query ($q: String, $genres: [String], $format: MediaFormat, $sort: [MediaSort], $startDate: FuzzyDateInt, $endDate: FuzzyDateInt) {
          Page(page: 1, perPage: 18) {
            media(search: $q, genre_in: $genres, format: $format, sort: $sort, startDate_greater: $startDate, endDate_less: $endDate, type: ANIME) {
              id
              title { english romaji }
              coverImage { large }
              genres
            }
          }
        }`;

      try {
        const response = await fetch('https://graphql.anilist.co', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: graphQLSchemaQuery, variables: variables })
        });
        const json = await response.json();
        const catalogItems = json.data?.Page?.media || [];

        if (catalogItems.length === 0) {
          grid.innerHTML = `<p class="text-xs text-gray-500 col-span-full py-8 text-center">No anime entries match your selected criteria.</p>`;
          return;
        }

        grid.innerHTML = '';
        catalogItems.forEach(anime => {
          const displayTitle = anime.title.english || anime.title.romaji;
          const displayGenre = anime.genres && anime.genres.length > 0 ? anime.genres[0] : 'Anime';
          
          const cardDiv = document.createElement('div');
          cardDiv.className = "anime-card bg-dark-card border border-dark rounded-2xl overflow-hidden cursor-pointer relative group";
          cardDiv.innerHTML = `
            <div class="aspect-[3/4] bg-neutral-900 overflow-hidden relative">
              <img src="${anime.coverImage.large}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
              <div class="card-overlay absolute inset-0 flex flex-col justify-end p-3">
                <h3 class="text-sm font-bold text-white line-clamp-2">${displayTitle}</h3>
                <p class="text-[11px] text-gray-400 mt-0.5">${displayGenre}</p>
              </div>
              <button class="absolute top-2 right-2 bg-black/40 hover:bg-black/80 text-white w-7 h-7 rounded-full flex items-center justify-center backdrop-blur transition-all text-xs">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
          `;
          grid.appendChild(cardDiv);
        });

      } catch (err) {
        grid.innerHTML = `<p class="text-xs text-red-400 col-span-full text-center">Catalog collection tracking interface standby error.</p>`;
      }
    }

    // Run core parameters check on load
    window.onload = function() {
      runCatalogQuery();
    };
  </script>
</body>
</html>
