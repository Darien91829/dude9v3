<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dude9anime</title>
    <style>
        :root {
            --bg-color: #050505;
            --container-bg: #111111;
            --accent-color: rgb(0, 255, 102); 
            --text-color: #ffffff;
            --muted-text: #888888;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* Top Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background: rgba(5, 5, 5, 0.95);
            position: sticky;
            top: 0;
            z-index: 90;
            border-bottom: 1px solid #1c1c1e;
            gap: 15px;
        }
        .logo {
            color: var(--accent-color); 
            text-shadow: 0 0 10px var(--accent-color); 
            font-size: 1.6rem; 
            font-weight: bold;
            margin: 0;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Persistent Header Search Bar Container */
        .header-search-box {
            display: none; 
            flex: 1;
            max-width: 400px;
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 20px;
            padding: 4px 6px 4px 14px;
            align-items: center;
            gap: 8px;
        }
        .header-search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
        }
        .header-search-btn {
            background: var(--accent-color);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
        }

        .settings-icon, .auth-trigger-icon {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--accent-color);
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* PAGE 1: EXCLUSIVE INITIAL LANDING CANVAS */
        .landing-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 85vh;
            min-height: 450px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            background: linear-gradient(180deg, rgba(5,5,5,0.4) 0%, rgba(5,5,5,1) 100%), 
                        url('https://images.alphacoders.com/134/1344238.png') center/cover no-repeat;
        }
        
        .hero-search-container {
            width: 100%;
            max-width: 550px;
            margin-bottom: 30px;
        }
        .search-box { 
            display: flex; 
            background: rgba(17, 17, 17, 0.9);
            border: 2px solid #222;
            border-radius: 30px; 
            padding: 6px 6px 6px 18px;
            gap: 10px; 
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .search-box:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }
        .search-box input { 
            flex: 1; 
            border: none;
            background: transparent; 
            color: var(--text-color); 
            font-size: 16px; 
            outline: none; 
        }
        .search-btn { 
            background: var(--accent-color); 
            color: #000; 
            font-weight: bold; 
            border: none; 
            padding: 11px 26px; 
            border-radius: 25px; 
            font-size: 15px; 
            cursor: pointer; 
        }

        .watch-now-btn {
            background: var(--accent-color);
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            padding: 16px 50px;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 255, 102, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
        }
        .watch-now-btn:active { transform: scale(0.95); }

        /* PAGE 2: MAIN MULTI-COLUMN PORTAL HUB EXPLORATION */
        .portal-dashboard {
            display: none; 
            width: 100%;
        }

        .content-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
            box-sizing: border-box;
        }

        @media (max-width: 900px) {
            .content-container { grid-template-columns: 1fr !important; }
            .side-panel { margin-top: 20px; }
        }

        .main-panel { min-width: 0; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0 15px 0;
            border-left: 4px solid var(--accent-color);
            padding-left: 12px;
        }
        .section-title { 
            color: #fff; 
            font-size: 1.3rem; 
            font-weight: bold; 
            margin: 0;
            text-align: left;
        }

        .header-clock {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--accent-color);
            background: rgba(0, 255, 102, 0.08);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 102, 0.2);
            font-weight: bold;
            white-space: nowrap;
        }

        /* Swiper Scroll Rows */
        .scroll-row {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px 0 15px 0;
            scroll-behavior: smooth;
        }
        .scroll-row::-webkit-scrollbar { height: 6px; }
        .scroll-row::-webkit-scrollbar-thumb { background: #2c2c2e; border-radius: 3px; }

        /* Catalog Layout Grids */
        .anime-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 18px; 
            margin-bottom: 30px; 
        }

        .anime-card { 
            background: var(--container-bg); 
            border-radius: 10px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: transform 0.2s, border-color 0.2s; 
            border: 1px solid #1c1c1e; 
            text-align: left;
            flex: 0 0 150px; 
        }
        .anime-card:hover { transform: translateY(-5px); border-color: var(--accent-color); box-shadow: 0 0 10px rgba(0, 255, 102, 0.2); }
        .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; }
        .anime-card .info-box { padding: 10px; }
        .anime-card .title { font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-color); margin-bottom: 4px; }

        /* Airing Calendars Day Navigation Switcher Components */
        .schedule-tabs {
            display: flex;
            background: var(--container-bg);
            border: 1px solid #1c1c1e;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            padding: 6px;
            gap: 6px;
        }
        .schedule-tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--muted-text);
            padding: 10px 0;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .schedule-tab-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.03);
        }
        .schedule-tab-btn.active {
            color: #000;
            background: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0, 255, 102, 0.2);
        }

        .schedule-list { 
            background: var(--container-bg); 
            border-radius: 0 0 12px 12px; 
            padding: 15px; 
            border: 1px solid #1c1c1e; 
            max-height: 380px; 
            overflow-y: auto; 
        }
        .schedule-list::-webkit-scrollbar { width: 4px; }
        .schedule-list::-webkit-scrollbar-thumb { background: #2c2c2e; border-radius: 2px; }
        
        .schedule-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .schedule-item:last-child { border-bottom: none; }
        .sched-left { text-align: left; max-width: 70%; min-width: 0; cursor: pointer; }
        .sched-title { font-size: 0.9rem; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sched-time { background: rgba(0, 255, 102, 0.1); color: var(--accent-color); font-size: 0.8rem; font-weight: bold; padding: 5px 10px; border-radius: 6px; font-family: monospace; }

        /* Top 10 Columns Blocks */
        .top10-wrapper { background: var(--container-bg); border-radius: 12px; border: 1px solid #1c1c1e; padding: 10px 15px; }
        .top10-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; cursor: pointer; }
        .top10-item:last-child { border-bottom: none; }
        .top10-rank { font-size: 1.5rem; font-weight: 900; color: var(--muted-text); width: 35px; font-style: italic; text-align: center; font-family: 'Arial Black', sans-serif; }
        .top10-item:nth-child(-n+3) .top10-rank { color: var(--accent-color); }
        .top10-thumb { width: 45px; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; margin-right: 12px; background: #222; }
        .top10-details { flex: 1; text-align: left; min-width: 0; }
        .top10-title { font-size: 0.85rem; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .top10-stats { font-size: 0.75rem; color: var(--muted-text); margin-top: 3px; }

        /* Video Playback Dashboard Containers & Premium Mask Upgrades */
        .stream-view {
            display: none;
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .player-wrapper-card {
            background: var(--container-bg);
            border: 1px solid #1c1c1e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            margin-bottom: 25px;
        }

        .player-container { 
            position: relative;
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 10px !important; 
            overflow: hidden; 
            border: 2px solid var(--accent-color); 
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); 
            margin-bottom: 0px !important;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Integrated Custom Floating Watermark Cover */
        .player-branded-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            border-radius: 20px;
            pointer-events: none; 
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pulse-indicator {
            color: var(--accent-color);
            animation: beaconGlow 2s infinite ease-in-out;
        }

        @keyframes beaconGlow {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* Unified Control Strip below video frame to mask scraping hooks */
        .player-deck-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #09090b;
            margin-top: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .deck-left {
            display: flex;
            gap: 10px;
        }

        .deck-action-btn {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            color: #eee;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .deck-action-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(0, 255, 102, 0.05);
        }

        .player-meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            gap: 15px;
        }
        .watchlist-toggle-btn {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .watchlist-toggle-btn.on-list {
            background: rgba(0, 255, 102, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .audio-toggle-container { margin: 15px auto; display: flex; justify-content: center; gap: 10px; }
        .audio-btn { background: #1c1c1e; color: #fff; border: 1px solid #2c2c2e; padding: 8px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .audio-btn.active { background: var(--accent-color); color: #000; border-color: var(--accent-color); }

        .ep-title { color: var(--accent-color); font-size: 1.3rem; margin: 0; font-weight: bold; text-align: left; }
        .episode-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0 40px 0; }
        .ep-btn { background: var(--container-bg); color: var(--text-color); border: 1px solid #222; padding: 10px 18px; font-size: 14px; border-radius: 6px; cursor: pointer; min-width: 65px; text-align: center; }
        .ep-btn:hover, .ep-btn.active { background: var(--accent-color); color: #000; border-color: var(--accent-color); font-weight: bold; box-shadow: 0 0 8px var(--accent-color); }

        /* Focus mode expansion rule */
        .viewport-focus-mode {
            max-width: 100% !important;
            padding: 0 !important;
        }

        /* AUTH POPUP MODAL LAYER */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 2000; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .modal-card { 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 360px; 
            padding: 25px; 
            box-sizing: border-box; 
            text-align: center; 
        }
        .modal-card h3 { margin-top: 0; color: var(--accent-color); font-size: 1.3rem; }
        .modal-card input { width: 100%; background: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 8px; padding: 12px; margin-bottom: 12px; color: #fff; box-sizing: border-box; outline: none; }
        .modal-card button { width: 100%; background: var(--accent-color); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 5px; }
        .modal-card .switch-mode-text { font-size: 12px; color: var(--muted-text); margin-top: 15px; cursor: pointer; }
        .modal-card .switch-mode-text span { color: var(--accent-color); text-decoration: underline; }
        .close-modal-btn { background: none; border: none; color: #ff4444; font-size: 12px; margin-top: 15px; cursor: pointer; text-decoration: underline; width: auto !important; }

        /* DRAWER BOTTOM SHEETS */
        .bottom-sheet-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            z-index: 1000; 
        }
        .bottom-sheet { 
            position: fixed; 
            bottom: -100%; 
            left: 0; 
            width: 100%; 
            background: #1c1c1e; 
            border-radius: 24px 24px 0 0; 
            box-sizing: border-box;
            padding: 24px; 
            z-index: 1001; 
            text-align: left;
            transition: bottom 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            max-height: 85vh;
            overflow-y: auto;
        }
        .bottom-sheet.open { bottom: 0; }
        .sheet-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 18px; color: #fff; text-align: center; }
        .theme-section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted-text); margin: 20px 0 10px 0; font-weight: bold; }

        .rgb-container { background: #2c2c2e; padding: 14px; border-radius: 14px; margin-bottom: 15px; }
        .slider-row { display: flex; align-items: center; margin-bottom: 12px; gap: 12px; }
        .slider-row label { width: 20px; font-weight: bold; font-size: 15px; }
        .slider-row input[type="range"] { flex: 1; accent-color: var(--accent-color); }
        .slider-row span { width: 35px; text-align: right; font-size: 14px; font-family: monospace; color: #aaa; }
        .color-preview-box { height: 40px; border-radius: 8px; border: 1px solid #444; margin-top: 12px; }

        .menu-row { display: flex; align-items: center; padding: 14px 4px; border-bottom: 1px solid #2c2c2e; cursor: pointer; }
        .menu-row input[type="radio"] { 
            appearance: none; -webkit-appearance: none; width: 22px; height: 22px; border: 2px solid #555; border-radius: 50%; margin-right: 14px; outline: none; display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .menu-row input[type="radio"]:checked { border-color: var(--accent-color); }
        .menu-row input[type="radio"]:checked::before { content: ""; width: 12px; height: 12px; background: var(--accent-color); border-radius: 50%; display: block; }
        .menu-row label { font-size: 1rem; color: #eee; flex: 1; cursor: pointer; }
        .done-btn { background: none; border: none; color: #fff; width: 100%; text-align: center; padding: 16px 0 6px 0; font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 10px; }

        /* LANDSCAPE STREAMING FULLSCREEN CONFIGURATIONS */
        @media (orientation: landscape) and (max-height: 500px) {
            body { padding: 0; background: #000; }
            header, .landing-screen, .portal-dashboard, .bottom-sheet-overlay, .bottom-sheet, .audio-toggle-container, .player-meta-bar, .episode-list, .player-deck-controls { 
                display: none !important; 
            }
            .stream-view { display: block !important; padding: 0; margin: 0; max-width: 100vw; }
            .player-container { 
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; max-width: 100vw; margin: 0; border: none; border-radius: 0; box-shadow: none; z-index: 9999; display: block !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="homeReturnReset()">dude9anime</div>
        
        <div id="header-search-engine" class="header-search-box">
            <input type="text" id="header-search-input" placeholder="Search anime titles...">
            <button class="header-search-btn" onclick="triggerCatalogSearch(true)">Search</button>
        </div>

        <div class="header-actions">
            <button class="auth-trigger-icon" onclick="openProfileModal()">👤</button>
            <button class="settings-icon" onclick="openBottomSheet()">⚙️</button>
        </div>
    </header>

    <div id="landing-portal" class="landing-screen">
        <div class="hero-search-container">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search anime titles directly...">
                <button class="search-btn" onclick="triggerCatalogSearch(false)">Search</button>
            </div>
        </div>
        <button class="watch-now-btn" onclick="openExplorationHub()">Watch Now</button>
    </div>

    <div id="main-exploration-hub" class="portal-dashboard">
        <div class="content-container" id="grid-split-container">
            <div class="main-panel">
                
                <div id="watchlist-wrapper-section" style="display: none;">
                    <div class="section-header">
                        <h2 class="section-title">My Watch List</h2>
                    </div>
                    <div id="my-watchlist-grid" class="anime-grid"></div>
                </div>

                <div id="recommendations-container-block">
                    <div class="section-header">
                        <h2 class="section-title">Editor Recommendations</h2>
                    </div>
                    <div id="recommendations-scroller" class="scroll-row"></div>
                </div>

                <div class="section-header">
                    <h2 class="section-title" id="grid-header-title">Recently Added Broadcasting Catalogs</h2>
                </div>
                <div id="results-grid" class="anime-grid"></div>
            </div>

            <div class="side-panel" id="sidebar-container-block">
                <div class="section-header" style="margin-top: 0; margin-bottom: 10px;">
                    <h2 class="section-title">Broadcast Schedule</h2>
                    <div id="live-24h-clock" class="header-clock">00:00:00 JST</div>
                </div>
                
                <div class="schedule-tabs">
                    <button id="tab-yesterday" class="schedule-tab-btn" onclick="changeScheduleDay('yesterday')">Yesterday</button>
                    <button id="tab-today" class="schedule-tab-btn active" onclick="changeScheduleDay('today')">Today</button>
                    <button id="tab-tomorrow" class="schedule-tab-btn" onclick="changeScheduleDay('tomorrow')">Tomorrow</button>
                </div>
                
                <div class="schedule-list" id="schedule-box">
                    <p style="padding:10px; font-size:13px; color:#888;">Syncing broadcast index...</p>
                </div>

                <div class="section-header">
                    <h2 class="section-title">Top 10 Watched Globally</h2>
                </div>
                <div class="top10-wrapper" id="top10-box"></div>
            </div>
        </div>
    </div>

    <div id="stream-dashboard-box" class="stream-view">
        
        <div class="player-wrapper-card">
            <div id="player-box" class="player-container">
                <div class="player-branded-overlay">
                    <span class="pulse-indicator">●</span> dude9 Engine Secure Node
                </div>
                <iframe id="video-iframe" src="" allowfullscreen scrolling="no"></iframe>
            </div>

            <div class="player-deck-controls">
                <div class="deck-left">
                    <button class="deck-action-btn" onclick="skipEpisodeStep(-1)">⏮ Prev</button>
                    <button class="deck-action-btn" onclick="skipEpisodeStep(1)">Next ⏭</button>
                    <button class="deck-action-btn" onclick="toggleFocusViewport()">📱 Focus</button>
                </div>
                
                <div id="audio-toggles" class="audio-toggle-container" style="margin: 0;">
                    <button id="sub-btn" class="audio-btn active" onclick="setLanguage('sub')">SUB</button>
                    <button id="dub-btn" class="audio-btn" onclick="setLanguage('dub')">DUB</button>
                </div>
            </div>
        </div>

        <div class="player-meta-bar">
            <h3 id="ep-title" class="ep-title">Available Episodes</h3>
            <button id="watchlist-toggle-btn" class="watchlist-toggle-btn" onclick="toggleWatchlistEntry()">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjMNzlM-TqGf5Q34rgmtzH9OG4jb40Jaw",
            authDomain: "dude9anime.firebaseapp.com",
            projectId: "dude9anime",
            storageBucket: "dude9anime.firebasestorage.app",
            messagingSenderId: "943197492354",
            appId: "1:943197492354:web:8a9ad93a497aee3a6cd09b",
            measurementId: "G-12B452FLD7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.currentUser = null;
        window.userWatchlist = [];
        window.isLoginMode = true;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                await syncUserWatchlistData();
            } else {
                window.currentUser = null;
                window.userWatchlist = [];
                const wlWrapper = document.getElementById('watchlist-wrapper-section');
                if (wlWrapper) wlWrapper.style.display = 'none';
            }
            updateWatchlistButtonUI();
        });

        async function syncUserWatchlistData() {
            if (!window.currentUser) return;
            const docRef = doc(db, "users", window.currentUser.uid);
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    window.userWatchlist = docSnap.data().watchlist || [];
                } else {
                    await setDoc(docRef, { watchlist: [] });
                    window.userWatchlist = [];
                }
                renderWatchlistGridRow();
            } catch (e) { console.error("Cloud synchronizer error:", e); }
        }

        function renderWatchlistGridRow() {
            const wrapper = document.getElementById('watchlist-wrapper-section');
            const grid = document.getElementById('my-watchlist-grid');
            if (!wrapper || !grid) return;
            grid.innerHTML = "";

            if (!window.currentUser || window.userWatchlist.length === 0) {
                wrapper.style.display = 'none';
                return;
            }

            wrapper.style.display = 'block';
            window.userWatchlist.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.style.flex = "unset";
                card.innerHTML = `<img src="${anime.img}"><div class="info-box"><div class="title">${anime.title}</div></div>`;
                card.onclick = () => window.loadStreamingLayout(anime.id, anime.title, anime.eps, anime.img);
                grid.appendChild(card);
            });
        }

        window.toggleWatchlistEntry = async function() {
            if (!window.currentUser) {
                alert("Please tap the account profile icon at the top to secure an account before creating playlists!");
                return;
            }

            const docRef = doc(db, "users", window.currentUser.uid);
            const entryItem = { 
                id: window.currentMalId, 
                title: window.activeAnimeTitle, 
                eps: window.activeMaxEpisodes, 
                img: window.activeImgUrl 
            };
            
            const alreadySaved = window.userWatchlist.some(a => String(a.id) === String(window.currentMalId));

            try {
                if (alreadySaved) {
                    const matchItem = window.userWatchlist.find(a => String(a.id) === String(window.currentMalId));
                    window.userWatchlist = window.userWatchlist.filter(a => String(a.id) !== String(window.currentMalId));
                    await updateDoc(docRef, { watchlist: arrayRemove(matchItem || entryItem) });
                } else {
                    window.userWatchlist.push(entryItem);
                    await updateDoc(docRef, { watchlist: arrayUnion(entryItem) });
                }
                updateWatchlistButtonUI();
                renderWatchlistGridRow();
            } catch(err) { alert("Error updating watchlist cloud array."); }
        };

        function updateWatchlistButtonUI() {
            const btn = document.getElementById('watchlist-toggle-btn');
            if(!btn) return;
            const alreadySaved = window.userWatchlist.some(a => String(a.id) === String(window.currentMalId));
            if (alreadySaved) {
                btn.className = "watchlist-toggle-btn on-list";
                btn.innerHTML = `<span>✓</span> Saved to List`;
            } else {
                btn.className = "watchlist-toggle-btn";
                btn.innerHTML = `<span>+</span> Add to List`;
            }
        }

        window.openProfileModal = function() {
            document.getElementById('auth-modal').style.display = 'flex';
            renderModalContent();
        };

        window.closeProfileModal = function() {
            document.getElementById('auth-modal').style.display = 'none';
        };

        window.toggleAuthMode = function() {
            window.isLoginMode = !window.isLoginMode;
            renderModalContent();
        };

        function renderModalContent() {
            const container = document.getElementById('modal-content-box');
            if (window.currentUser) {
                container.innerHTML = `
                    <h3>Your Watchlist Profile</h3>
                    <p style="font-size: 13px; color: #888; margin-bottom: 20px;">Authenticated secure via: <br><b style="color:#fff;">${window.currentUser.email}</b></p>
                    <button id="signout-submit-btn">Sign Out</button>
                    <button class="close-modal-btn" onclick="closeProfileModal()">Close</button>
                `;
                document.getElementById('signout-submit-btn').onclick = window.handleLogOut;
            } else {
                container.innerHTML = `
                    <h3>${window.isLoginMode ? 'Sign In Securely' : 'Create Account'}</h3>
                    <input type="email" id="auth-email" placeholder="Email Address">
                    <input type="password" id="auth-pass" placeholder="Password">
                    <button id="auth-submit-btn">${window.isLoginMode ? 'Login' : 'Register'}</button>
                    <p class="switch-mode-text" onclick="toggleAuthMode()">
                        ${window.isLoginMode ? "Don't have an account? <span>Register</span>" : "Already verified? <span>Login</span>"}
                    </p>
                    <button class="close-modal-btn" onclick="closeProfileModal()">Cancel</button>
                `;
                document.getElementById('auth-submit-btn').onclick = window.processAuthSubmission;
            }
        }

        window.processAuthSubmission = async function() {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            if(!email || !pass) { alert("Missing credentials."); return; }

            try {
                if (window.isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                }
                closeProfileModal();
            } catch (err) { alert(err.message); }
        };

        window.handleLogOut = async function() {
            await signOut(auth);
            closeProfileModal();
        };

        const nativeLoader = window.loadStreamingLayout;
        window.loadStreamingLayout = async function(malId, titleName, totalEpisodes, imgUrl = "") {
            window.currentMalId = malId;
            window.activeAnimeTitle = titleName;
            window.activeMaxEpisodes = totalEpisodes;
            window.activeImgUrl = imgUrl || "https://images.alphacoders.com/134/1344238.png";
            updateWatchlistButtonUI();
            
            if (nativeLoader) nativeLoader(malId, titleName, totalEpisodes);
        };
        
        const nativeReset = window.homeReturnReset;
        window.homeReturnReset = function() {
            if(nativeReset) nativeReset();
            renderWatchlistGridRow();
        };

        const nativeHubLoader = window.openExplorationHub;
        window.openExplorationHub = function() {
            if(nativeHubLoader) nativeHubLoader();
            renderWatchlistGridRow();
        };
    </script>

    <script>
        const MAL_PLAYER_BASE = "https://megaplay.buzz/stream/mal";

        let currentEpisodeIndex = 1;
        let currentLanguage = 'sub';
        window.currentMalId = "";
        window.activeAnimeTitle = "";
        window.activeMaxEpisodes = 12;
        window.activeImgUrl = "";
        
        let selectedBgValue = "pitch-black";
        let rVal = 0, gVal = 255, bVal = 102;
        let activeScheduleDay = 'today';

        function startSystemClock() {
            setInterval(() => {
                const now = new Date();
                const jstString = now.toLocaleTimeString("en-US", {
                    timeZone: "Asia/Tokyo",
                    hour12: false,
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit"
                });
                const clockEl = document.getElementById('live-24h-clock');
                if (clockEl) {
                    clockEl.innerText = `${jstString} JST`;
                }
            }, 1000);
        }

        function openBottomSheet() {
            document.getElementById('sheet-overlay').style.display = 'block';
            setTimeout(() => { document.getElementById('bottom-sheet-menu').classList.add('open'); }, 10);
            updateRgbMixer();
        }

        function closeBottomSheet() {
            document.getElementById('bottom-sheet-menu').classList.remove('open');
            setTimeout(() => { document.getElementById('sheet-overlay').style.display = 'none'; }, 300);
        }

        function updateRgbMixer() {
            rVal = document.getElementById('range-r').value;
            gVal = document.getElementById('range-g').value;
            bVal = document.getElementById('range-b').value;
            document.getElementById('val-r').innerText = rVal;
            document.getElementById('val-g').innerText = gVal;
            document.getElementById('val-b').innerText = bVal;
            document.getElementById('rgb-preview').style.backgroundColor = `rgb(${rVal}, ${gVal}, ${bVal})`;
        }

        function selectRadioTile(value) {
            document.getElementById(`radio-${value}`).checked = true;
            selectedBgValue = value;
        }

        function saveThemeAndClose() {
            if (document.getElementById('radio-dark-gray').checked) selectedBgValue = "dark-gray";
            else selectedBgValue = "pitch-black";

            let bg = "#050505", container = "#111111";
            if (selectedBgValue === "dark-gray") { bg = "#1a1a1e"; container = "#252529"; }

            const targetColor = `rgb(${rVal}, ${gVal}, ${bVal})`;
            document.documentElement.style.setProperty('--accent-color', targetColor);
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--container-bg', container);

            localStorage.setItem('dude9anime-r', rVal);
            localStorage.setItem('dude9anime-g', gVal);
            localStorage.setItem('dude9anime-b', bVal);
            localStorage.setItem('dude9anime-bg', selectedBgValue);
            closeBottomSheet();
        }

        function loadSavedTheme() {
            const savedR = localStorage.getItem('dude9anime-r');
            const savedG = localStorage.getItem('dude9anime-g');
            const savedB = localStorage.getItem('dude9anime-b');
            const savedBgMode = localStorage.getItem('dude9anime-bg');

            if (savedR !== null && savedG !== null && savedB !== null) {
                rVal = savedR; gVal = savedG; bVal = savedB;
                document.getElementById('range-r').value = rVal;
                document.getElementById('range-g').value = gVal;
                document.getElementById('range-b').value = bVal;
                document.documentElement.style.setProperty('--accent-color', `rgb(${savedR}, ${savedG}, ${savedB})`);
            }
            if (savedBgMode) {
                selectedBgValue = savedBgMode;
                let bg = "#050505", container = "#111111";
                if (savedBgMode === "dark-gray") { bg = "#1a1a1e"; container = "#252529"; }
                document.documentElement.style.setProperty('--bg-color', bg);
                document.documentElement.style.setProperty('--container-bg', container);
                const targetRadio = document.getElementById(`radio-${savedBgMode}`);
                if(targetRadio) targetRadio.checked = true;
            }
        }

        function openExplorationHub() {
            document.getElementById('landing-portal').style.display = 'none';
            document.getElementById('stream-dashboard-box').style.display = 'none';
            document.getElementById('main-exploration-hub').style.display = 'block';
            document.getElementById('header-search-engine').style.display = 'flex';
            document.getElementById('recommendations-container-block').style.display = 'block';
            document.getElementById('sidebar-container-block').style.display = 'block';
            document.getElementById('grid-split-container').style.gridTemplateColumns = "1fr 320px";
            document.getElementById('grid-header-title').innerText = "Recently Added Broadcasting Catalogs";
            loadMainHubFeeds();
        }

        function homeReturnReset() {
            clearTimeout(window.streamLoadGuard);
            document.getElementById('stream-dashboard-box').style.display = 'none';
            document.getElementById('main-exploration-hub').style.display = 'none';
            document.getElementById('header-search-engine').style.display = 'none';
            document.getElementById('landing-portal').style.display = 'flex';
            document.getElementById('search-input').value = "";
            document.getElementById('header-search-input').value = "";
        }

        async function loadMainHubFeeds() {
            fetchLiveReleasingSchedule(activeScheduleDay);
            try {
                const res = await fetch("https://api.jikan.moe/v4/top/anime?limit=22");
                const json = await res.json();
                const dataset = json.data || [];
                if(dataset.length > 0) {
                    displayScrollFeed(dataset.slice(0, 10), 'recommendations-scroller');
                    displayGridFeed(dataset.slice(10, 22), 'results-grid');
                    displayTop10Sidebar(dataset.slice(0, 10));
                }
            } catch (err) { 
                document.getElementById('results-grid').innerHTML = "<p>Network database offline.</p>"; 
            }
        }

        async function triggerCatalogSearch(fromHeader = false) {
            const queryFieldId = fromHeader ? 'header-search-input' : 'search-input';
            const query = document.getElementById(queryFieldId).value.trim();
            if(!query) return alert("Enter your search keywords first!");
            document.getElementById('search-input').value = query;
            document.getElementById('header-search-input').value = query;
            document.getElementById('landing-portal').style.display = 'none';
            document.getElementById('stream-dashboard-box').style.display = 'none';
            document.getElementById('main-exploration-hub').style.display = 'block';
            document.getElementById('header-search-engine').style.display = 'flex';
            document.getElementById('recommendations-container-block').style.display = 'none';
            document.getElementById('sidebar-container-block').style.display = 'none';
            document.getElementById('grid-split-container').style.gridTemplateColumns = "1fr";
            document.getElementById('grid-header-title').innerText = `Search Results matching: "${query}"`;
            document.getElementById('results-grid').innerHTML = "<p>Searching catalogs...</p>";
            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=16`);
                const json = await res.json();
                if(!json.data || json.data.length === 0) document.getElementById('results-grid').innerHTML = "<p>No titles matched.</p>";
                else displayGridFeed(json.data, 'results-grid');
            } catch (e) { document.getElementById('results-grid').innerHTML = "<p>Search system busy.</p>"; }
        }

        function changeScheduleDay(targetDay) {
            activeScheduleDay = targetDay;
            document.querySelectorAll('.schedule-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${targetDay}`).classList.add('active');
            fetchLiveReleasingSchedule(targetDay);
        }

        async function fetchLiveReleasingSchedule(dayMode) {
            const scheduleBox = document.getElementById('schedule-box');
            scheduleBox.innerHTML = '<p style="padding:10px; font-size:13px; color:#888;">Updating timeline...</p>';
            const weekdays = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
            
            let currentDayIndex = new Date().getDay();
            if (dayMode === 'yesterday') currentDayIndex = (currentDayIndex - 1 + 7) % 7;
            else if (dayMode === 'tomorrow') currentDayIndex = (currentDayIndex + 1) % 7;
            const targetDayString = weekdays[currentDayIndex];

            try {
                const response = await fetch(`https://api.jikan.moe/v4/schedules?filter=${targetDayString}&limit=25`);
                const json = await response.json();
                const rawAnimeList = json.data || [];
                const ongoingAnime = rawAnimeList.filter(anime => anime.airing === true || anime.status === "Currently Airing");
                
                if(ongoingAnime.length === 0) { 
                    scheduleBox.innerHTML = `<p style="padding:10px; font-size:13px; color:#888;">No ongoing broadcasts scheduled.</p>`; 
                    return; 
                }
                
                scheduleBox.innerHTML = '';
                
                const mapCleanCache = new Map();
                ongoingAnime.forEach(anime => {
                    const title = anime.title_english || anime.title;
                    if(!mapCleanCache.has(title)) {
                        mapCleanCache.set(title, anime);
                    }
                });

                mapCleanCache.forEach(anime => {
                    const title = anime.title_english || anime.title;
                    const broadcastTime = anime.broadcast?.time || "Airing";
                    const imgUrl = anime.images?.jpg?.image_url || "";
                    const div = document.createElement('div');
                    div.className = 'schedule-item';
                    div.innerHTML = `
                        <div class="sched-left" onclick="loadStreamingLayout(${anime.mal_id}, '${title.replace(/'/g, "\\'")}', ${anime.episodes || 12}, '${imgUrl}')">
                            <div class="sched-title">${title}</div>
                        </div>
                        <div class="sched-time">JST ${broadcastTime}</div>
                    `;
                    scheduleBox.appendChild(div);
                });
            } catch (error) { 
                scheduleBox.innerHTML = `<p style="padding:10px; font-size:13px; color:#ff4444;">Failed to sync broadcast calendar.</p>`; 
            }
        }

        function displayScrollFeed(animeArray, elementId) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            animeArray.forEach(anime => {
                const title = anime.title_english || anime.title;
                const imgUrl = anime.images?.jpg?.image_url || '';
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.innerHTML = `<img src="${imgUrl}"><div class="info-box"><div class="title">${title}</div></div>`;
                card.onclick = () => loadStreamingLayout(anime.mal_id, title, anime.episodes || 12, imgUrl);
                container.appendChild(card);

            const container = document.getElementById(elementId);

            animeArray.forEach(anime => {
                const title = anime.title_english || anime.title;
                const imgUrl = anime.images?.jpg?.image_url || '';

                card.className = 'anime-card';

                card.onclick = () => loadStreamingLayout(anime.mal_id, title, anime.episodes || 12, imgUrl);

        function displayTop10Sidebar(animeArray) {
            const container = document.getElementById('top10-box');
            container.innerHTML = '';
            animeArray.forEach((anime, idx) => {
                const title = anime.title_english || anime.title;
                const imgUrl = anime.images?.jpg?.image_url || '';

                container.appendChild(row);
            });

        async function loadStreamingLayout(malId, titleName, totalEpisodes, imgUrl = "") {
            window.currentMalId = malId;
            window.activeAnimeTitle = titleName;
            window.activeMaxEpisodes = totalEpisodes;
            window.activeImgUrl = imgUrl || "https://images.alphacoders.com/134/1344238.png";
            
            if(window.updateWatchlistButtonUI) window.updateWatchlistButtonUI();

            clearTimeout(window.streamLoadGuard);
            
            // Keep the custom watermark overlay layer intact inside the reset container wrapper
            document.getElementById('player-box').innerHTML = `
                <div class="player-branded-overlay"><span class="pulse-indicator">●</span> dude9 Engine Secure Node</div>
                <iframe id="video-iframe" src="" allowfullscreen scrolling="no"></iframe>
            `;
            
            document.getElementById('main-exploration-hub').style.display = 'none';
            document.getElementById('stream-dashboard-box').style.display = 'block';
            document.getElementById('ep-title').innerText = `Watching: ${titleName}`;
            document.getElementById('header-search-engine').style.display = 'flex';
            const epBox = document.getElementById('episode-buttons');
            epBox.innerHTML = '';
            for (let i = 1; i <= totalEpisodes; i++) {
                const btn = document.createElement('button');
                btn.className = 'ep-btn';
                btn.id = `ep-choice-${i}`;
                btn.innerText = `${i}`;
                btn.onclick = () => launchVideoPlayer(i);
                epBox.appendChild(btn);
            }
            launchVideoPlayer(1);
        }

        function launchVideoPlayer(epNum) {
            currentEpisodeIndex = epNum;
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`ep-choice-${epNum}`);
            if (activeBtn) activeBtn.classList.add('active');
            
            const iframe = document.getElementById('video-iframe');
            if (iframe) {
                iframe.src = `${MAL_PLAYER_BASE}/${window.currentMalId}/${epNum}/${currentLanguage}`;
            }
            
            clearTimeout(window.streamLoadGuard);
            window.streamLoadGuard = setTimeout(() => handleStreamMissingNotice(), 8000);
        }

        // Action Deck Utilities: Handle Next/Prev and Focus viewport overrides safely
        function skipEpisodeStep(direction) {
            let nextIndex = currentEpisodeIndex + direction;
            if (nextIndex >= 1 && nextIndex <= window.activeMaxEpisodes) {
                launchVideoPlayer(nextIndex);
            }
        }

        function toggleFocusViewport() {
            const dashboardBlock = document.getElementById('stream-dashboard-box');
            if (dashboardBlock) {
                dashboardBlock.classList.toggle('viewport-focus-mode');
                dashboardBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function handleStreamMissingNotice() {
            document.getElementById('player-box').innerHTML = `
                <div style="width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#111; color:#aaa; padding:20px; text-align:center;">
                    <p style="font-size:1.4rem; color:var(--accent-color); text-shadow: 0 0 10px var(--accent-color); font-weight:bold; margin-bottom:5px;">⚠️ Video Source Not Available</p>
                    <p style="font-size:0.9rem; color:#666; margin-bottom:20px;">The third-party streaming API could not parse a valid media source folder for this episode catalog.</p>
                    <button onclick="openExplorationHub()" style="background:var(--accent-color); color:#000; border:none; padding:10px 24px; border-radius:20px; font-weight:bold; cursor:pointer; font-size:14px; box-shadow:0 0 12px var(--accent-color);">Back to Dashboard</button>
                </div>`;
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            document.getElementById('sub-btn').classList.toggle('active', lang === 'sub');
            document.getElementById('dub-btn').classList.toggle('active', lang === 'dub');
            launchVideoPlayer(currentEpisodeIndex);
        }

        window.addEventListener("message", function (event) {
            let data = event.data;
            if (typeof data === "string") { try { data = JSON.parse(data); } catch (e) { return; } }
            if (data && (data.event === "playing" || data.event === "ready")) {
                clearTimeout(window.streamLoadGuard);
            }
            if (data && data.event === "error") {
                clearTimeout(window.streamLoadGuard);
                handleStreamMissingNotice();
            }
        });

        window.onload = function() {
            loadSavedTheme();
            startSystemClock();
        };
    </script>
</body>
</html>
