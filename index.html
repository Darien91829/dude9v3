<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thedude9 Anime</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #050505; }
    .bg-dark-card { background-color: #111111; }
    .bg-dark-input { background-color: #1c1c1e; }
    .border-dark { border-color: #1c1c1e; }
    .genre-tag.active { background-color: #10b981 !important; color: #000000 !important; border-color: #10b981 !important; }
  </style>
</head>
<body class="text-gray-200 min-h-screen relative overflow-x-hidden">

  <main class="max-w-7xl mx-auto px-4 py-6">
    <section id="landing-portal" class="flex flex-col justify-center items-center text-center py-12 px-4 rounded-xl border border-dark mb-10 bg-gradient-to-b from-emerald-950/10 to-transparent">
      <div class="max-w-2xl w-full space-y-6">
        <h1 class="text-3xl font-extrabold tracking-tight text-white sm:text-4xl">Welcome to <span class="text-emerald-400">Thedude9</span></h1>
        
        <div class="bg-dark-card p-2 rounded-full border border-dark flex items-center shadow-2xl">
          <input type="text" id="search-input" placeholder="Search titles..." class="w-full bg-transparent pl-4 pr-2 text-sm focus:outline-none text-white">
          <button onclick="triggerCatalogSearch(false)" class="bg-emerald-500 hover:bg-emerald-400 text-black font-bold px-6 py-2 rounded-full text-xs uppercase tracking-wider transition-colors shrink-0">Search</button>
        </div>

        <div class="bg-dark-card border border-dark rounded-xl p-4 text-left space-y-4 shadow-xl">
          <div class="flex items-center justify-between border-b border-dark/60 pb-2">
            <span class="text-xs font-bold uppercase tracking-wider text-emerald-400">Advanced Filters</span>
            <button onclick="resetAdvancedFilters()" class="text-[10px] bg-dark-input border border-dark text-gray-400 py-1 px-2.5 rounded">Reset</button>
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-[10px] font-bold uppercase text-gray-500">Format</label>
              <select id="filter-format" class="w-full text-xs bg-dark-input border border-dark rounded p-2 text-gray-300">
                <option value="">All Formats</option>
                <option value="TV">TV Series</option>
                <option value="MOVIE">Movie</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] font-bold uppercase text-gray-500">Sort Order</label>
              <select id="filter-sort" class="w-full text-xs bg-dark-input border border-dark rounded p-2 text-gray-300">
                <option value="POPULARITY_DESC">Popular</option>
                <option value="TRENDING_DESC">Trending</option>
                <option value="SCORE_DESC">Highest Rated</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="main-exploration-hub" class="hidden space-y-8">
        <div id="results-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            <p class="text-xs text-gray-500">Loading catalog...</p>
        </div>
    </section>
  </main>

  <script>
    // Updated function to handle auto-popular load
    async function triggerCatalogSearch(fromHeader = false) {
      document.getElementById('landing-portal').classList.add('hidden');
      document.getElementById('main-exploration-hub').classList.remove('hidden');
      
      const query = document.getElementById('search-input').value;
      const format = document.getElementById('filter-format').value || null;
      const sort = document.getElementById('filter-sort').value || "POPULARITY_DESC";

      const variables = { q: query || null, format: format, sort: [sort] };
      const aniListSearchQuery = `
        query ($q: String, $format: MediaFormat, $sort: [MediaSort]) {
          Page(page: 1, perPage: 24) {
            media(search: $q, format: $format, sort: $sort, type: ANIME) {
              id idMal title { romaji } coverImage { large } episodes
            }
          }
        }`;

      const res = await fetch('https://graphql.anilist.co', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: aniListSearchQuery, variables: variables })
      });
      const json = await res.json();
      displayGridFeed(json.data.Page.media, 'results-grid');
    }

    // Auto-load popular items on start
    window.onload = function() {
        // Trigger initial search for popular anime
        triggerCatalogSearch();
    };
  </script>
</body>
</html>
